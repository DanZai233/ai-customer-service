name: luma-customer-service

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: luma_customer_service
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - luma-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luma -d luma_customer_service"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://luma:luma@database:5432/luma_customer_service
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  luma:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgresql://luma:luma@database:5432/luma_customer_service
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  luma-postgres:
